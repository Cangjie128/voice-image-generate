<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>小王 AI 语音生图 Demo</title>
    <meta
      name="description"
      content="小王 AI 语音生图网站演示：语音唤醒、语音描述、生图进度与历史生图。"
    />
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        --ink: #f7fbff;
        --muted: #a9bfd2;
        --deep: #04101d;
        --panel: rgba(247, 251, 255, 0.1);
        --line: rgba(255, 255, 255, 0.18);
        --cyan: #75e8df;
        --coral: #ffb39a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        color: var(--ink);
        background:
          radial-gradient(circle at 50% 115%, rgba(255, 179, 154, 0.2), transparent 34%),
          linear-gradient(180deg, #061120 0%, #081d30 48%, #0b3141 100%);
      }

      body::before {
        position: fixed;
        inset: 0;
        pointer-events: none;
        content: "";
        background-image:
          radial-gradient(circle, rgba(117, 232, 223, 0.75) 0 1px, transparent 1.5px),
          radial-gradient(circle, rgba(255, 224, 167, 0.6) 0 1px, transparent 1.5px);
        background-position:
          0 0,
          42px 58px;
        background-size:
          120px 120px,
          160px 160px;
        opacity: 0.28;
      }

      main {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 22px;
        width: min(1120px, calc(100% - 32px));
        min-height: 100dvh;
        margin: 0 auto;
        padding: 42px 0;
      }

      header {
        display: grid;
        gap: 10px;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 6vw, 56px);
        line-height: 1.05;
        letter-spacing: 0;
      }

      p {
        max-width: 680px;
        margin: 0 auto;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.7;
      }

      .demo-card {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(8, 25, 42, 0.72);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(22px);
      }

      .demo-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        min-height: 54px;
        padding: 0 18px;
        border-bottom: 1px solid var(--line);
        color: #ffe0a7;
        font-weight: 800;
      }

      .demo-bar span:last-child {
        color: var(--cyan);
        font-size: 13px;
        font-weight: 700;
      }

      video {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        background: var(--deep);
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 16px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        color: #04101d;
        background: var(--cyan);
        font-weight: 800;
        text-decoration: none;
        transition:
          transform 180ms ease,
          background-color 180ms ease;
      }

      a.secondary {
        color: var(--ink);
        background: var(--panel);
      }

      a:hover {
        transform: translateY(-1px);
        background: #bdf8df;
      }

      a.secondary:hover {
        background: rgba(247, 251, 255, 0.16);
      }

      @media (max-width: 640px) {
        main {
          width: min(100% - 22px, 460px);
          padding: 24px 0;
        }

        .demo-bar {
          align-items: flex-start;
          flex-direction: column;
          justify-content: center;
          padding: 12px 14px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>小王 AI 语音生图 Demo</h1>
        <p>
          语音唤醒小王，说出想画的内容，等待生成结果，并在历史生图中回看已生成的画面。
        </p>
      </header>

      <section class="demo-card" aria-label="演示视频">
        <div class="demo-bar">
          <span>演示视频</span>
          <span>Voice to Image</span>
        </div>
        <video controls preload="metadata" poster="demo-poster.jpg">
          <source src="demo.mp4" type="video/mp4" />
          当前浏览器不支持视频播放，请直接下载 demo.mp4 查看。
        </video>
      </section>

      <nav class="links" aria-label="相关链接">
        <a href="demo.mp4">打开视频文件</a>
        <a class="secondary" href="https://github.com/Cangjie128/voice-image-generate">
          查看 GitHub 仓库
        </a>
      </nav>
    </main>
  </body>
</html>
